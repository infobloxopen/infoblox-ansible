      infoblox.nios_modules.nios_host_record:
        name: "{{ host5 }}"
        ipv4addrs:
          - ipv4addr: "192.168.108.32"
            remove: true
        view: default
        state: present
        provider: *nios_provider5
      register: r
    - ansible.builtin.debug:
        msg: "Idempotent remove .32 -> changed={{ r.changed }}  (expected False)"

    - name: "P5 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host5 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.33" }]
        view: default
        state: absent
        provider: *nios_provider5
      ignore_errors: true


- name: "Play 6 | DHCP enabled with MAC + idempotency + IP update"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nios_provider: &nios_provider6
      host: "{{ nios_host }}"
      username: "{{ nios_username }}"
      password: "{{ nios_password }}"
      wapi_version: "{{ nios_wapi_version | default('2.11') }}"
      ssl_verify: "{{ nios_ssl_verify | default(false) }}"
    host6: "issue108-dhcp.ansibletestzone.com"
  tasks:
    - name: "P6 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host6 }}"
        ipv4addrs: [{ ipv4addr: "192.168.1.150", configure_for_dhcp: true, mac: "00:11:22:33:44:50" }]
        view: default
        state: absent
        provider: *nios_provider6
      ignore_errors: true
    - name: "P6 | Cleanup .41"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host6 }}"
        ipv4addrs: [{ ipv4addr: "192.168.1.151", configure_for_dhcp: true, mac: "00:11:22:33:44:51" }]
        view: default
        state: absent
        provider: *nios_provider6
      ignore_errors: true

    - name: "P6 | Step 1 | CREATE DHCP=true + MAC -> .40  [expect changed=True]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host6 }}"
        ipv4addrs:
          - ipv4addr: "192.168.1.150"
            configure_for_dhcp: true
            mac: "00:11:22:33:44:50"
        view: default
        comment: "issue108 play6 dhcp test"
        state: present
        provider: *nios_provider6
      register: r
    - ansible.builtin.debug:
        msg: "Create DHCP -> changed={{ r.changed }}  (expected True)"

    - name: "P6 | Step 2 | IDEMPOTENT DHCP re-run  [expect changed=False]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host6 }}"
        ipv4addrs:
          - ipv4addr: "192.168.1.150"
            configure_for_dhcp: true
            mac: "00:11:22:33:44:50"
        view: default
        comment: "issue108 play6 dhcp test"
        state: present
        provider: *nios_provider6
      register: r
    - ansible.builtin.debug:
        msg: "Idempotent DHCP -> changed={{ r.changed }}  (expected False)"

    - name: "P6 | Step 3 | UPDATE IP DHCP: same name -> .41  [expect changed=True]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host6 }}"
        ipv4addrs:
          - ipv4addr: "192.168.1.151"
            configure_for_dhcp: true
            mac: "00:11:22:33:44:51"
        view: default
        comment: "issue108 play6 dhcp test"
        state: present
        provider: *nios_provider6
      register: r
    - ansible.builtin.debug:
        msg: "Update IP DHCP -> changed={{ r.changed }}  (expected True)"

    - name: "P6 | Step 4 | IDEMPOTENT DHCP after update  [expect changed=False]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host6 }}"
        ipv4addrs:
          - ipv4addr: "192.168.1.151"
            configure_for_dhcp: true
            mac: "00:11:22:33:44:51"
        view: default
        comment: "issue108 play6 dhcp test"
        state: present
        provider: *nios_provider6
      register: r
    - ansible.builtin.debug:
        msg: "Idempotent DHCP after update -> changed={{ r.changed }}  (expected False)"

    - name: "P6 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host6 }}"
        ipv4addrs: [{ ipv4addr: "192.168.1.151", configure_for_dhcp: true, mac: "00:11:22:33:44:51" }]
        view: default
        state: absent
        provider: *nios_provider6
      ignore_errors: true

# =============================================================================
# Play 7 — Aliases (Issue #160): aliases always changed (false-positive)
#
# Bug: After creating a host with aliases, a second identical run reports
#      changed=True instead of changed=False (idempotency failure).
# Fix: Add `continue` after the aliases set-comparison block in
#      compare_objects() so the loop does not fall through to subitem checks
#      that can incorrectly trigger a diff for string-list fields.
# =============================================================================
