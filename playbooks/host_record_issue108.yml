---
# Playbook: host_record_issue108.yml
# Module:   infoblox.nios_modules.nios_host_record
#
# Issue # Host record bug fixes (IP update, multi-IP, add/remove, DHCP).108 
#   Play 1: Same name + different IP update (DNS enabled)
#   Play 2: Same name + different IP update (DNS disabled / IPAM-only)
#   Play 3: Multi-IP host record creation + idempotency
#   Play 4: Add IP to existing record (add: true) + idempotency
#   Play 5: Remove IP from existing record (remove: true) + idempotency
#   Play 6: DHCP-enabled host with MAC address + IP update + idempotency
#
#  do NOT hardcode. Supply via one of:Credentials 
#   1. Extra vars:  -e nios_host=192.0.2.1 -e nios_username=admin -e nios_password=secret
#   2. Vars file:   -e @nios_vars.yml   (see playbooks/nios_vars.yml.example)
#   3. Vault:       ansible-vault encrypt nios_vars.yml ; ... --ask-vault-pass
#
# Required: nios_host, nios_username, nios_password
# Optional: nios_wapi_version (2.11), nios_ssl_verify (false)

- name: "Play 1 | Bug 1 | Same name + different IP - DNS ENABLED"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nios_provider: &nios_provider
      host: "{{ nios_host }}"
      username: "{{ nios_username }}"
      password: "{{ nios_password }}"
      wapi_version: "{{ nios_wapi_version | default('2.11') }}"
      ssl_verify: "{{ nios_ssl_verify | default(false) }}"
    host1: "issue108-dns-on.ansibletestzone.com"
  tasks:
    - name: "P1 | Cleanup .10"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host1 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.10" }]
        view: default
        state: absent
        provider: *nios_provider
      ignore_errors: true
    - name: "P1 | Cleanup .11"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host1 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.11" }]
        view: default
        state: absent
        provider: *nios_provider
      ignore_errors: true

    - name: "P1 | Step 1 | CREATE {{ host1 }} -> .10  [expect changed=True]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host1 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.10" }]
        view: default
        comment: "issue108 play1 test"
        state: present
        provider: *nios_provider
      register: r
    - ansible.builtin.debug:
        msg: "Create -> changed={{ r.changed }}  (expected True)"

    - name: "P1 | Step 2 | IDEMPOTENT same IP .10  [expect changed=False]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host1 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.10" }]
        view: default
        comment: "issue108 play1 test"
        state: present
        provider: *nios_provider
      register: r
    - ansible.builtin.debug:
        msg: "Idempotent same IP -> changed={{ r.changed }}  (expected False)"

    - name: "P1 | Step 3 | UPDATE IP: same name -> .11  [expect changed=True, was CONFLICT on master]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host1 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.11" }]
        view: default
        comment: "issue108 play1 test"
        state: present
        provider: *nios_provider
      register: r
    - ansible.builtin.debug:
        msg: "Update IP -> changed={{ r.changed }}  (expected True)"

    - name: "P1 | Step 4 | IDEMPOTENT after update .11  [expect changed=False]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host1 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.11" }]
        view: default
        comment: "issue108 play1 test"
        state: present
        provider: *nios_provider
      register: r
    - ansible.builtin.debug:
        msg: "Idempotent after update -> changed={{ r.changed }}  (expected False)"

    - name: "P1 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host1 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.11" }]
        view: default
        state: absent
        provider: *nios_provider
      ignore_errors: true


- name: "Play 2 | Bug 1 | Same name + different IP - DNS DISABLED (IPAM-only)"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nios_provider: &nios_provider2
      host: "{{ nios_host }}"
      username: "{{ nios_username }}"
      password: "{{ nios_password }}"
      wapi_version: "{{ nios_wapi_version | default('2.11') }}"
      ssl_verify: "{{ nios_ssl_verify | default(false) }}"
    host2: "issue108-dns-off.ansibletestzone.com"
  tasks:
    - name: "P2 | Cleanup .12"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host2 }}"
        ipv4addrs: [{ ipv4addr: "192.168.1.112" }]
        configure_for_dns: false
        state: absent
        provider: *nios_provider2
      ignore_errors: true
    - name: "P2 | Cleanup .13"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host2 }}"
        ipv4addrs: [{ ipv4addr: "192.168.1.113" }]
        configure_for_dns: false
        state: absent
        provider: *nios_provider2
      ignore_errors: true

    - name: "P2 | Step 1 | CREATE DNS-off {{ host2 }} -> .12  [expect changed=True]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host2 }}"
        ipv4addrs: [{ ipv4addr: "192.168.1.112" }]
        configure_for_dns: false
        comment: "issue108 play2 dns-off test"
        state: present
        provider: *nios_provider2
      register: r
    - ansible.builtin.debug:
        msg: "Create DNS-off -> changed={{ r.changed }}  (expected True)"

    - name: "P2 | Step 2 | IDEMPOTENT DNS-off same IP .12  [expect changed=False]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host2 }}"
        ipv4addrs: [{ ipv4addr: "192.168.1.112" }]
        configure_for_dns: false
        comment: "issue108 play2 dns-off test"
        state: present
        provider: *nios_provider2
      register: r
    - ansible.builtin.debug:
        msg: "Idempotent DNS-off -> changed={{ r.changed }}  (expected False)"

    - name: "P2 | Step 3 | UPDATE IP DNS-off: same name -> .13  [expect changed=True, was CONFLICT on master]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host2 }}"
        ipv4addrs: [{ ipv4addr: "192.168.1.113" }]
        configure_for_dns: false
        comment: "issue108 play2 dns-off test"
        state: present
        provider: *nios_provider2
      register: r
    - ansible.builtin.debug:
        msg: "Update IP DNS-off -> changed={{ r.changed }}  (expected True)"

    - name: "P2 | Step 4 | IDEMPOTENT DNS-off after update .13  [expect changed=False]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host2 }}"
        ipv4addrs: [{ ipv4addr: "192.168.1.113" }]
        configure_for_dns: false
        comment: "issue108 play2 dns-off test"
        state: present
        provider: *nios_provider2
      register: r
    - ansible.builtin.debug:
        msg: "Idempotent DNS-off after update -> changed={{ r.changed }}  (expected False)"

    - name: "P2 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host2 }}"
        ipv4addrs: [{ ipv4addr: "192.168.1.113" }]
        configure_for_dns: false
        state: absent
        provider: *nios_provider2
      ignore_errors: true


- name: "Play 3 | Multi-IP | Create host with 2 IPs at once + idempotency"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nios_provider: &nios_provider3
      host: "{{ nios_host }}"
      username: "{{ nios_username }}"
      password: "{{ nios_password }}"
      wapi_version: "{{ nios_wapi_version | default('2.11') }}"
      ssl_verify: "{{ nios_ssl_verify | default(false) }}"
    host3: "issue108-multi-ip.ansibletestzone.com"
  tasks:
    - name: "P3 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host3 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.20" }]
        view: default
        state: absent
        provider: *nios_provider3
      ignore_errors: true

    - name: "P3 | Step 1 | CREATE with 2 IPs (.20 and .21)  [expect changed=True]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host3 }}"
        ipv4addrs:
          - ipv4addr: "192.168.108.20"
          - ipv4addr: "192.168.108.21"
        view: default
        comment: "issue108 play3 multi-ip test"
        state: present
        provider: *nios_provider3
      register: r
    - ansible.builtin.debug:
        msg: "Create multi-IP -> changed={{ r.changed }}  (expected True)"

    - name: "P3 | Step 2 | IDEMPOTENT multi-IP re-run  [expect changed=False]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host3 }}"
        ipv4addrs:
          - ipv4addr: "192.168.108.20"
          - ipv4addr: "192.168.108.21"
        view: default
        comment: "issue108 play3 multi-ip test"
        state: present
        provider: *nios_provider3
      register: r
    - ansible.builtin.debug:
        msg: "Idempotent multi-IP -> changed={{ r.changed }}  (expected False)"

    - name: "P3 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host3 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.20" }]
        view: default
        state: absent
        provider: *nios_provider3
      ignore_errors: true


- name: "Play 4 | Bug 2 | add: true - Add IP to existing host + idempotency"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nios_provider: &nios_provider4
      host: "{{ nios_host }}"
      username: "{{ nios_username }}"
      password: "{{ nios_password }}"
      wapi_version: "{{ nios_wapi_version | default('2.11') }}"
      ssl_verify: "{{ nios_ssl_verify | default(false) }}"
    host4: "issue108-add-ip.ansibletestzone.com"
  tasks:
    - name: "P4 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host4 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.30" }]
        view: default
        state: absent
        provider: *nios_provider4
      ignore_errors: true

    - name: "P4 | Step 1 | CREATE with .30  [expect changed=True]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host4 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.30" }]
        view: default
        state: present
        provider: *nios_provider4
      register: r
    - ansible.builtin.debug:
        msg: "Create -> changed={{ r.changed }}  (expected True)"

    - name: "P4 | Step 2 | ADD .31 using add: true  [expect changed=True]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host4 }}"
        ipv4addrs:
          - ipv4addr: "192.168.108.31"
            add: true
        view: default
        state: present
        provider: *nios_provider4
      register: r
    - ansible.builtin.debug:
        msg: "Add .31 -> changed={{ r.changed }}  (expected True)"

    - name: "P4 | Step 3 | IDEMPOTENT add .31 again (already exists)  [expect changed=False, was WAPI error on master]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host4 }}"
        ipv4addrs:
          - ipv4addr: "192.168.108.31"
            add: true
        view: default
        state: present
        provider: *nios_provider4
      register: r
    - ansible.builtin.debug:
        msg: "Idempotent add .31 -> changed={{ r.changed }}  (expected False)"

    - name: "P4 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host4 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.30" }]
        view: default
        state: absent
        provider: *nios_provider4
      ignore_errors: true


- name: "Play 5 | Bug 2 | remove: true - Remove IP from host + idempotency"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nios_provider: &nios_provider5
      host: "{{ nios_host }}"
      username: "{{ nios_username }}"
      password: "{{ nios_password }}"
      wapi_version: "{{ nios_wapi_version | default('2.11') }}"
      ssl_verify: "{{ nios_ssl_verify | default(false) }}"
    host5: "issue108-remove-ip.ansibletestzone.com"
  tasks:
    - name: "P5 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host5 }}"
        ipv4addrs: [{ ipv4addr: "192.168.108.32" }]
        view: default
        state: absent
        provider: *nios_provider5
      ignore_errors: true

    - name: "P5 | Step 1 | CREATE with .32 and .33  [expect changed=True]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host5 }}"
        ipv4addrs:
          - ipv4addr: "192.168.108.32"
          - ipv4addr: "192.168.108.33"
        view: default
        state: present
        provider: *nios_provider5
      register: r
    - ansible.builtin.debug:
        msg: "Create -> changed={{ r.changed }}  (expected True)"

    - name: "P5 | Step 2 | REMOVE .32 using remove: true  [expect changed=True, was WAPI error on master]"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host5 }}"
        ipv4addrs:
          - ipv4addr: "192.168.108.32"
