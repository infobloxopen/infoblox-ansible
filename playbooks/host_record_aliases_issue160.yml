---
# Playbook: host_record_aliases_issue160.yml
# Module:   infoblox.nios_modules.nios_host_record
#
# Issue # Aliases idempotency (aliases always reported changed false-positive).160 
#   Play 7:  FQDN, short, mixed, order-reversed, add/remove, DNS-disabledAliases 
#
#  do NOT hardcode. Supply via one of:Credentials 
#   1. Extra vars:  -e nios_host=192.0.2.1 -e nios_username=admin -e nios_password=secret
#   2. Vars file:   -e @nios_vars.yml   (see playbooks/nios_vars.yml.example)
#   3. Vault:       ansible-vault encrypt nios_vars.yml ; ... --ask-vault-pass
#
# Required: nios_host, nios_username, nios_password
# Optional: nios_wapi_version (2.11), nios_ssl_verify (false)

- name: "Play 7 — Aliases idempotency (Issue #160)"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    nios_provider: &nios_provider7
      host: "{{ nios_host }}"
      username: "{{ nios_username }}"
      password: "{{ nios_password }}"
      wapi_version: "{{ nios_wapi_version | default('2.11') }}"
      ssl_verify: "{{ nios_ssl_verify | default(false) }}"
    host7: "aliases-test.ansibletestzone.com"
    host7_nodns: "aliases-nodns-test.ansibletestzone.com"

  tasks:
    - name: "P7 | Cleanup before test"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs: [{ ipv4addr: "10.10.10.60" }]
        aliases:
          - "alias1.ansibletestzone.com"
          - "alias2.ansibletestzone.com"
        view: default
        state: absent
        provider: *nios_provider7
      ignore_errors: true

    - name: "P7 | Create host with aliases"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.60"
        aliases:
          - "alias1.ansibletestzone.com"
          - "alias2.ansibletestzone.com"
        view: default
        comment: "issue160 aliases test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: r.changed
        msg: "FAIL: Create should report changed=True"
    - ansible.builtin.debug:
        msg: "Create with aliases -> changed={{ r.changed }}  (expected True) ✓"

    - name: "P7 | Idempotent re-run (same aliases — must NOT change)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.60"
        aliases:
          - "alias1.ansibletestzone.com"
          - "alias2.ansibletestzone.com"
        view: default
        comment: "issue160 aliases test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: not r.changed
        msg: "BUG #160: Idempotent aliases run reported changed=True (false-positive)"
    - ansible.builtin.debug:
        msg: "Idempotent aliases re-run -> changed={{ r.changed }}  (expected False) ✓"

    - name: "P7 | Add a third alias"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.60"
        aliases:
          - "alias1.ansibletestzone.com"
          - "alias2.ansibletestzone.com"
          - "alias3.ansibletestzone.com"
        view: default
        comment: "issue160 aliases test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: r.changed
        msg: "FAIL: Adding new alias should report changed=True"
    - ansible.builtin.debug:
        msg: "Add alias3 -> changed={{ r.changed }}  (expected True) ✓"

    - name: "P7 | Idempotent re-run with 3 aliases (order reversed — must NOT change)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.60"
        aliases:
          - "alias3.ansibletestzone.com"
          - "alias1.ansibletestzone.com"
          - "alias2.ansibletestzone.com"
        view: default
        comment: "issue160 aliases test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: not r.changed
        msg: "BUG: Order-insensitive aliases idempotency failed (changed=True)"
    - ansible.builtin.debug:
        msg: "Idempotent re-run (reversed order) -> changed={{ r.changed }}  (expected False) ✓"

    - name: "P7 | Remove one alias (remove alias3)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.60"
        aliases:
          - "alias1.ansibletestzone.com"
          - "alias2.ansibletestzone.com"
        view: default
        comment: "issue160 aliases test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: r.changed
        msg: "FAIL: Removing an alias should report changed=True"
    - ansible.builtin.debug:
        msg: "Remove alias3 -> changed={{ r.changed }}  (expected True) ✓"

    - name: "P7 | Cleanup"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs: [{ ipv4addr: "10.10.10.60" }]
        aliases:
          - "alias1.ansibletestzone.com"
          - "alias2.ansibletestzone.com"
        view: default
        state: absent
        provider: *nios_provider7
      ignore_errors: true

    # --- Issue #160 core reproducer: SHORT (relative) alias names ---
    # WAPI stores aliases as FQDNs. User-supplied short names (no dots) are
    # expanded by WAPI to <alias>.<zone>. Without fix, idempotent re-run
    # compares "shortalias" vs "shortalias.ansibletestzone.com" → always changed.

    - name: "P7 | Cleanup short-alias host"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs: [{ ipv4addr: "10.10.10.62" }]
        aliases:
          - "shortalias1"
          - "shortalias2"
        view: default
        state: absent
        provider: *nios_provider7
      ignore_errors: true

    - name: "P7 | Create host with SHORT alias names (issue #160 reproducer)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.62"
        aliases:
          - "shortalias1"
          - "shortalias2"
        view: default
        comment: "issue160 short alias test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: r.changed
        msg: "FAIL: Create with short aliases should report changed=True"
    - ansible.builtin.debug:
        msg: "Create with short aliases -> changed={{ r.changed }}  (expected True) ✓"

    - name: "P7 | Idempotent re-run with SHORT aliases (BUG #160: must NOT change)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.62"
        aliases:
          - "shortalias1"
          - "shortalias2"
        view: default
        comment: "issue160 short alias test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: not r.changed
        msg: "BUG #160: Short alias idempotent re-run reported changed=True (false-positive)"
    - ansible.builtin.debug:
        msg: "Idempotent re-run short aliases -> changed={{ r.changed }}  (expected False) ✓"

    - name: "P7 | Cleanup short-alias host (post)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs: [{ ipv4addr: "10.10.10.62" }]
        aliases:
          - "shortalias1"
          - "shortalias2"
        view: default
        state: absent
        provider: *nios_provider7
      ignore_errors: true

    # --- Matrix: Mixed short + FQDN aliases ---
    - name: "P7 | Cleanup mixed-alias host"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs: [{ ipv4addr: "10.10.10.63" }]
        view: default
        state: absent
        provider: *nios_provider7
      ignore_errors: true

    - name: "P7 | Create host with MIXED (short + FQDN) aliases"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.63"
        aliases:
          - "shortalias3"
          - "fqdn-alias.ansibletestzone.com"
        view: default
        comment: "issue160 mixed alias test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: r.changed
        msg: "FAIL: Create with mixed aliases should report changed=True"
    - ansible.builtin.debug:
        msg: "Create mixed aliases -> changed={{ r.changed }}  (expected True) ✓"

    - name: "P7 | Idempotent re-run with MIXED aliases (must NOT change)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.63"
        aliases:
          - "shortalias3"
          - "fqdn-alias.ansibletestzone.com"
        view: default
        comment: "issue160 mixed alias test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: not r.changed
        msg: "BUG: Mixed alias idempotent re-run reported changed=True"
    - ansible.builtin.debug:
        msg: "Idempotent mixed aliases -> changed={{ r.changed }}  (expected False) ✓"

    - name: "P7 | Cleanup mixed-alias host (post)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs: [{ ipv4addr: "10.10.10.63" }]
        view: default
        state: absent
        provider: *nios_provider7
      ignore_errors: true

    # --- Matrix: Remove ALL aliases (host still present, aliases dropped) ---
    - name: "P7 | Cleanup remove-all-aliases host"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs: [{ ipv4addr: "10.10.10.64" }]
        view: default
        state: absent
        provider: *nios_provider7
      ignore_errors: true

    - name: "P7 | Create host with aliases (for remove-all test)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.64"
        aliases:
          - "rmalias1.ansibletestzone.com"
        view: default
        comment: "issue160 remove-all aliases test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: r.changed
        msg: "FAIL: Create should report changed=True"

    - name: "P7 | Remove ALL aliases by omitting aliases key"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs:
          - ipv4addr: "10.10.10.64"
        view: default
        comment: "issue160 remove-all aliases test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.debug:
        msg: "Remove all aliases (omit key) -> changed={{ r.changed }}  (note: WAPI preserves aliases when field is omitted)"

    - name: "P7 | Cleanup remove-all-aliases host (post)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7 }}"
        ipv4addrs: [{ ipv4addr: "10.10.10.64" }]
        view: default
        state: absent
        provider: *nios_provider7
      ignore_errors: true

    # --- Matrix: DNS-DISABLED host + short aliases (no FQDN expansion) ---
    # NOTE: NIOS stores DNS-disabled host records in view " " (space), not
    # "default". Omit the view here so cleanup matches and re-runs stay idempotent.
    # NOTE: Omit ipv4addrs here. For IPAM-only (view " ") host records,
    # state=absent must match by name only; including ipv4addrs prevents the
    # #300 retry-without-view lookup from matching, leaving a stale record.
    - name: "P7 | Cleanup DNS-disabled alias host"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7_nodns }}"
        configure_for_dns: false
        state: absent
        provider: *nios_provider7
      ignore_errors: true

    - name: "P7 | Create DNS-disabled host with short aliases"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7_nodns }}"
        ipv4addrs:
          - ipv4addr: "192.168.1.90"
        configure_for_dns: false
        aliases:
          - "nodns-alias1"
          - "nodns-alias2"
        view: default
        comment: "issue160 dns-disabled alias test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: r.changed
        msg: "FAIL: Create DNS-disabled with aliases should report changed=True"
    - ansible.builtin.debug:
        msg: "Create DNS-disabled + short aliases -> changed={{ r.changed }}  (expected True) ✓"

    - name: "P7 | Idempotent re-run DNS-disabled + short aliases (must NOT change)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7_nodns }}"
        ipv4addrs:
          - ipv4addr: "192.168.1.90"
        configure_for_dns: false
        aliases:
          - "nodns-alias1"
          - "nodns-alias2"
        view: default
        comment: "issue160 dns-disabled alias test"
        state: present
        provider: *nios_provider7
      register: r
    - ansible.builtin.assert:
        that: not r.changed
        msg: "BUG: DNS-disabled short alias idempotent re-run reported changed=True"
    - ansible.builtin.debug:
        msg: "Idempotent DNS-disabled short aliases -> changed={{ r.changed }}  (expected False) ✓"

    - name: "P7 | Cleanup DNS-disabled alias host (post)"
      infoblox.nios_modules.nios_host_record:
        name: "{{ host7_nodns }}"
        configure_for_dns: false
        state: absent
        provider: *nios_provider7
      ignore_errors: true


